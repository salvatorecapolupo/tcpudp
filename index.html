<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Simulatore TCP/UDP</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #eef2f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    h1 {
      margin-bottom: 0.5rem;
    }

    .network {
      position: relative;
      width: 90%;
      max-width: 800px;
      height: 320px;
      border: 2px dashed #999;
      margin-top: 1rem;
      border-radius: 1rem;
      background: white;
    }

    .device {
      position: absolute;
      width: 120px;
      height: 60px;
      background-color: #4682B4;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-weight: bold;
    }

    #sender { top: 30px; left: 20px; }
    #receiver { bottom: 30px; right: 20px; }

    .receiver-box {
      position: absolute;
      bottom: 100px;
      right: 10px;
      width: 200px;
      min-height: 40px;
      background-color: #fff;
      border: 2px solid #ccc;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      color: #333;
    }

    .packet {
      position: absolute;
      background-color: #FFCC00;
      border: 2px solid #999;
      border-radius: 50%;
      padding: 10px;
      font-size: 12px;
      opacity: 0.9;
      white-space: nowrap;
    }

    .ack {
      background-color: #00CC66;
      color: white;
    }

    .controls {
      margin-top: 1rem;
      text-align: center;
    }

    textarea {
      width: 300px;
      height: 50px;
      resize: none;
      margin-bottom: 1rem;
    }

    button {
      margin: 0 10px;
      padding: 10px 20px;
      font-weight: bold;
      border: none;
      background-color: #333;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .legend {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.9em;
      color: #444;
    }

    .explanation {
      margin-top: 2rem;
      font-size: 1em;
      color: #555;
      max-width: 700px;
    }

  </style>
</head>
<body>

  <h1>Simulatore TCP vs UDP</h1>
  <div class="controls">
    <textarea id="message" placeholder="Scrivi un messaggio da inviare (max 50 caratteri)" maxlength="50">Hello World!</textarea><br>
    <button onclick="startTCP()">Invia con TCP</button>
    <button onclick="startUDP()">Invia con UDP</button>
    <button onclick="reset()">Reset</button>
  </div>

  <div class="network" id="network">
    <div class="device" id="sender">Mittente</div>
    <div class="device" id="receiver">Destinatario</div>
    <div class="receiver-box" id="receiverBox">Messaggio ricevuto: <span id="outputMsg"></span></div>
  </div>

  <div class="legend">
    <p><strong>TCP</strong>: come una email, garantisce ordine e conferma ricezione (ACK). Più lento ma affidabile.</p>
    <p><strong>UDP</strong>: come un video in streaming, non garantisce ricezione. Più veloce ma senza controllo.</p>
  </div>

  <div class="explanation" id="explanation"></div>

  <script>
    const network = document.getElementById("network");
    const explanation = document.getElementById("explanation");
    const outputMsg = document.getElementById("outputMsg");

    const sender = document.getElementById("sender");
    const receiver = document.getElementById("receiver");

    const senderX = sender.offsetLeft + sender.offsetWidth / 2;
    const senderY = sender.offsetTop + sender.offsetHeight / 2;

    const receiverX = receiver.offsetLeft + receiver.offsetWidth / 2;
    const receiverY = receiver.offsetTop + receiver.offsetHeight / 2;

    let udpBuffer = [];

    function createPacket(text, isAck = false) {
      const packet = document.createElement("div");
      packet.className = "packet" + (isAck ? " ack" : "");
      packet.innerText = text;
      network.appendChild(packet);
      return packet;
    }

    function movePacket(packet, fromX, fromY, toX, toY, duration, callback) {
      packet.style.left = fromX + "px";
      packet.style.top = fromY + "px";
      setTimeout(() => {
        packet.style.transition = `transform ${duration}s ease-in-out`;
        packet.style.transform = `translate(${toX - fromX}px, ${toY - fromY}px)`;
      }, 50);
      setTimeout(() => {
        if (callback) callback();
      }, duration * 1000 + 50);
    }

    function startTCP() {
      reset();
      const message = document.getElementById("message").value;
      explanation.innerHTML = "<strong>TCP:</strong><br>1. Invio pacchetto<br>2. Attesa ACK<br>3. Ricomposizione messaggio nell’ordine corretto";
      outputMsg.innerText = "";

      const parts = message.match(/.{1,5}/g) || [];
      let i = 0;
      function sendNext() {
        if (i >= parts.length) return;
        const part = parts[i];
        const latency = Math.random() * 1.5 + 0.5;
        const packet = createPacket(part);
        movePacket(packet, senderX, senderY, receiverX, receiverY, latency, () => {
          outputMsg.innerText += part;
          const ack = createPacket("ACK", true);
          movePacket(ack, receiverX, receiverY, senderX, senderY, latency, () => {
            i++;
            sendNext();
          });
        });
      }
      sendNext();
    }

    function startUDP() {
      reset();
      const message = document.getElementById("message").value;
      explanation.innerHTML = "<strong>UDP:</strong><br>1. Invio tutti i pacchetti senza aspettare risposta.<br>2. Ricomposizione possibile ma non ordinata.";
      outputMsg.innerText = "";
      udpBuffer = [];

      const parts = message.match(/.{1,3}/g) || [];

      parts.forEach((part, i) => {
        setTimeout(() => {
          const packet = createPacket(part);
          const latency = Math.random() * 0.8 + 0.2;
          movePacket(packet, senderX, senderY, receiverX, receiverY, latency, () => {
            // Inserimento casuale nell’array per simulare disordine
            udpBuffer.splice(Math.floor(Math.random() * (udpBuffer.length + 1)), 0, part);
            outputMsg.innerText = udpBuffer.join('');
          });
        }, i * 150);
      });
    }

    function reset() {
      explanation.innerHTML = "";
      outputMsg.innerText = "";
      udpBuffer = [];
      document.querySelectorAll(".packet").forEach(p => p.remove());
    }
  </script>

</body>
</html>
